name: Post Tech News Carousel

# Two ways this runs:
#  1. schedule  -> fully automatic, twice a day at the times below (UTC)
#  2. workflow_dispatch -> the manual "Run workflow" button on the Actions tab
#
# GitHub Actions cron is always UTC, regardless of DISPLAY_TIMEZONE_OFFSET_HOURS
# in config.py (that only affects the date printed on a slide).
# IST is UTC+5:30, so:
#   9:00 AM IST  = 3:30 AM UTC  -> "30 3 * * *"
#   6:00 PM IST  = 12:30 PM UTC -> "30 12 * * *"
on:
  schedule:
    - cron: "30 3 * * *"    # 9:00 AM IST
    - cron: "30 12 * * *"   # 6:00 PM IST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build slides only, don't post to Instagram"
        type: boolean
        default: false
      unofficial:
        description: "Use the instagrapi path instead of the official API"
        type: boolean
        default: false

# Needed so the workflow can commit posted_history.json back to the repo
# after each run (so the next run knows what's already been posted).
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ "${{ inputs.unofficial }}" = "true" ]; then pip install instagrapi; fi

      # One step runs the whole flow: pick story -> fetch real article text ->
      # summarize into points (Gemini) -> generate slides (Gemini images) ->
      # post -> mark posted. Ordering is handled inside run_pipeline.py.
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IMAGE_HOST_MODE: github
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.unofficial }}" = "true" ]; then ARGS="$ARGS --unofficial"; fi
          python run_pipeline.py $ARGS

      - name: Commit story history
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "tech-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add posted_history.json todays_story.json
          git commit -m "History update for $(date -u +'%Y-%m-%d')" || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Upload slides as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ github.run_id }}
          path: output/
          retention-days: 7
